name: frontend-e2e

# Runs only when a PR carries the `ui` label. Adds a browser test layer for
# UI changes; gated to avoid spending ~5 min of CI on every backend PR.
# Trigger manually by adding the `ui` label to a PR.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  e2e:
    if: contains(github.event.pull_request.labels.*.name, 'ui')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('src/frontend/package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate CI admin password
        # I-01 fix (cso-diff-2026-05-17): replace the previous hardcoded
        # `CiTestPassword!1` fallback with a per-run random value so the
        # repo never publishes a default admin credential, even one only
        # reachable from the runner sandbox. Honours an explicit
        # E2E_ADMIN_PASSWORD secret override when set. The literal `Aa1!`
        # suffix guarantees OWASP ASVS 2.1 complexity classes on the
        # random branch (upper / lower / digit / special) — `tr -d`
        # strips base64 chars that would break form-encoded curl bodies
        # later.
        env:
          OVERRIDE: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            PASS="$OVERRIDE"
          else
            PASS="$(openssl rand -base64 24 | tr -d '/+=\n')Aa1!"
          fi
          echo "::add-mask::$PASS"
          echo "ADMIN_PASSWORD=$PASS" >> "$GITHUB_ENV"

      - name: Start Trinity stack
        working-directory: ${{ github.workspace }}
        env:
          # ADMIN_PASSWORD is inherited from GITHUB_ENV (see the
          # "Generate CI admin password" step above).
          ANTHROPIC_API_KEY: ${{ secrets.E2E_ANTHROPIC_API_KEY || 'placeholder' }}
        run: |
          # Generate the minimum .env needed to boot. Real secrets are not
          # required for e2e — login uses ADMIN_PASSWORD only.
          cp .env.example .env
          echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "SECRET_KEY=$(openssl rand -hex 32)" >> .env
          ./scripts/deploy/start.sh

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "backend healthy"; exit 0
            fi
            sleep 2
          done
          echo "backend never became healthy"; exit 1

      - name: Verify non-root containers and Docker socket reachability
        working-directory: ${{ github.workspace }}
        # Issue #874: regression guard for Trinity-built backend images.
        # Asserts that every container that holds platform credentials or
        # the docker.sock mount runs as the expected non-root UID, and —
        # load-bearing — that backend can still reach the Docker socket on
        # Linux (group_add wired through correctly).
        #
        # The socket reachability check runs `docker.from_env().ping()` from
        # INSIDE the backend container, exercising the same Docker SDK code
        # path the platform uses at runtime. The previous /api/agents probe
        # was a false positive — services.docker_service.list_all_agents_fast
        # catches every Docker exception and returns []; an unreachable
        # socket therefore yielded HTTP 200 with `[]`, passing CI while
        # agent creation would still fail in production.
        #
        # ADMIN_PASSWORD is inherited from GITHUB_ENV (see the "Generate
        # CI admin password" step). The prod frontend image is covered
        # separately by the "Verify prod frontend image UID" step below.
        run: |
          set -euo pipefail
          for c in trinity-backend trinity-scheduler trinity-mcp-server; do
            UID_IN=$(docker exec "$c" id -u)
            if [ "$UID_IN" != "1000" ]; then
              echo "FAIL: $c runs as UID $UID_IN (expected 1000)"; exit 1
            fi
          done
          # Real Docker-socket round-trip from inside the backend (group_add probe).
          docker exec trinity-backend python3 -c \
            "import docker, sys; sys.exit(0 if docker.from_env().ping() else 1)" \
            || { echo "FAIL: backend cannot reach /var/run/docker.sock"; exit 1; }
          # Auth + table read sanity (separate signal from the socket probe above).
          TOKEN=$(curl -fs -X POST http://localhost:8000/api/token \
            -d "username=admin&password=${ADMIN_PASSWORD}" | jq -r .access_token)
          [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "FAIL: token mint"; exit 1; }
          AGENTS_HTTP=$(curl -s -o /tmp/agents.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" http://localhost:8000/api/agents)
          [ "$AGENTS_HTTP" = "200" ] || { echo "FAIL: /api/agents returned $AGENTS_HTTP"; exit 1; }
          jq -e 'type == "array"' /tmp/agents.json >/dev/null \
            || { echo "FAIL: /api/agents response is not a JSON array"; exit 1; }
          echo "verify-non-root: PASS"

      - name: Verify prod frontend image UID
        working-directory: ${{ github.workspace }}
        # I-02 fix (cso-diff-2026-05-17): close the #874 CI gap for the
        # prod frontend image. The e2e workflow boots the dev compose
        # (Vite-dev image), so the prod image (nginxinc/nginx-unprivileged:alpine,
        # UID 101) is built here out-of-band and its USER UID asserted
        # directly. Build context matches docker-compose.prod.yml's
        # `frontend.build` block (context=src/frontend, file=docker/frontend/Dockerfile.prod).
        run: |
          set -euo pipefail
          docker build \
            -f docker/frontend/Dockerfile.prod \
            -t trinity-frontend:prod-check \
            ./src/frontend
          UID_FE=$(docker run --rm --entrypoint id trinity-frontend:prod-check -u)
          if [ "$UID_FE" != "101" ]; then
            echo "FAIL: prod frontend UID $UID_FE (expected 101)"; exit 1
          fi
          echo "verify-prod-frontend-uid: PASS"

      - name: Skip first-time setup wizard
        working-directory: ${{ github.workspace }}
        run: |
          # On a fresh DB the admin user is bootstrapped from ADMIN_PASSWORD,
          # but `setup_completed` stays false (the backfill migration runs
          # before admin creation). Without this flag the frontend redirects
          # every route to /setup. Mark setup complete directly.
          docker exec trinity-backend python3 -c "from database import db; db.set_setting('setup_completed', 'true'); print('setup_completed=true')"

      - name: Run Playwright smoke tests
        env:
          # ADMIN_PASSWORD is inherited from GITHUB_ENV (see the "Generate
          # CI admin password" step).
          E2E_BASE_URL: http://localhost
        # Only @smoke-tagged specs run in CI. @visual / @interactive specs
        # are local-only until their flake/baseline story is sorted (#596).
        run: npm run test:e2e:smoke

      - name: Collect Trinity logs on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          docker compose logs --no-color --tail=200 backend frontend mcp-server > trinity-logs.txt || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/frontend/e2e/playwright-report/
          retention-days: 14

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            src/frontend/e2e/test-results/
            trinity-logs.txt
          retention-days: 14
